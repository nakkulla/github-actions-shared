have_fun: false

memory_config:
  disabled: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 20
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: false

ignore_patterns:
  - "tmp/**"
  - "logs/**"
  - ".worktrees/**"
  - ".venv/**"
  - "node_modules/**"
  - "**/__pycache__/**"
  - "**/.pytest_cache/**"
